<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .form-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .btn-update { background: #e94560; border-color: #e94560; }
        .btn-update:hover { background: #c73652; border-color: #c73652; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">상품 수정</h4>
        <small class="text-muted">상품 정보를 수정하고 저장하세요.</small>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card form-card">
                <div class="card-body p-5">
                    <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">상품명 <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control form-control-lg"
                                   placeholder="상품명을 입력하세요" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">가격 (원) <span class="text-danger">*</span></label>
                            <div class="input-group input-group-lg">
                                <input type="number" th:field="*{price}" class="form-control"
                                       placeholder="0" min="0" required/>
                                <span class="input-group-text">원</span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">재고 수량 <span class="text-danger">*</span></label>
                            <div class="input-group input-group-lg">
                                <input type="number" th:field="*{stock}" class="form-control"
                                       placeholder="0" min="0" required/>
                                <span class="input-group-text">개</span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">상품 설명</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"
                                      placeholder="상품 설명을 입력하세요"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-update text-white btn-lg flex-grow-1 fw-semibold">수정 완료</button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary btn-lg px-4">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div style="position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; font-size: 14px; font-weight: bold; color: #333; z-index: 9999; background-color: rgba(255, 255, 255, 0.8); padding: 8px 0; border-top: 1px solid #ddd;">
    <span th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
    <span> | 학번: 2371341 | 성명: 김가람</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
