<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h4 class="fw-bold mb-4">비밀번호 변경</h4>
                <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">
                    <div class="mb-3">
                        <label class="form-label">현재 비밀번호</label>
                        <input type="password" th:field="*{currentPassword}" class="form-control" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">새 비밀번호</label>
                        <input type="password" th:field="*{newPassword}" class="form-control" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">새 비밀번호 확인</label>
                        <input type="password" th:field="*{confirmPassword}" class="form-control" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">변경하기</button>
                    <a th:href="@{/home}" class="btn btn-outline-secondary w-100 mt-2">취소</a>
                </form>
            </div>
        </div>
    </div>
</div>

<div style="position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; font-size: 14px; font-weight: bold; color: #333; z-index: 9999; background-color: rgba(255, 255, 255, 0.8); padding: 8px 0; border-top: 1px solid #ddd;">
    <span th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
    <span> | 학번: 2371341 | 성명: 김가람</span>
</div>
</body>
</html>
